version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: cron
      cronjob: "7 2 28 * *"
    open-pull-requests-limit: 10
  - package-ecosystem: pip
    directory: "/docs"
    schedule:
      interval: cron
      cronjob: "7 2 28 * *"
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: cron
      cronjob: "7 2 28 * *"
    open-pull-requests-limit: 10
